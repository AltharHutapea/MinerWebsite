<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login akun</title>
    <link rel="icon" href="../img/LogoWebsite.png">
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <!-- icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head>

<style>
    *, html {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }
    body {
        background-color: #bb9e7c;
        font-family: "DynaPuff", sans-serif;
    }
    nav div img {
        width: 50px;
        background-color: transparent;
    }
    nav {
        background-color: rgb(45, 245, 75);
        display: flex;
        justify-content: space-between;
        padding: 1rem 2rem;
    }
    nav ul {
        display: flex;
        align-items: center;
        gap: 2rem;
        list-style: none;
    }
    nav ul li a {
        text-decoration: none;
        color: #191919;
        font-weight: 600;
        padding: 8px 0;
        transition: all;
        transition-duration: 700ms;
        border-bottom: 1px solid rgba(255, 68, 0, 0);
    }
    nav ul li a:hover {
        color: orangered;
        border-bottom: 1px solid orangered;
        background-color: aqua;
    }
    .icon-list {
        font-size: 30px;
        display: none;
    }
    .form-login {
        background: lightblue;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* Efek bayangan halus */
        width: 600px;
        height: 300px;
        justify-items: center;
        margin-top: 270px;
        margin-left: 650px;
        font-size: 20px;
    }
    form div label{
        background-color: red;
        color: aqua;
        margin-left: 120px;
    }
    form div input{
        background-color: yellow;
        font-size: 20px;
        color: green;
        margin-left: 120px;
        margin-top: 0.3rem;
        margin-bottom: 0.3rem;
    }
    form div p {
        margin-left: 120px;
    }
    #daftar {
        text-decoration: none;
        color: white;
        background-color: brown;
        transition: all;
        transition-duration: 700ms;
        border-bottom: 1px solid rgba(255, 68, 0, 0);
        font-size: 20px;
    }
    #daftar:hover{
        color: orangered;
        border-bottom: 1px solid orangered;
        background-color: rgb(45, 245, 75)  ;
    }
    .submit {
        background-color: violet;
        color: green;
        justify-items: center;
        margin-top: 20px;
        margin-left: 230px;
        width: 25px;
    }
    .submit button {
        background-color: yellow;
        color: green;
        padding: 5px 20px;
        cursor: pointer;
        transition: all;
        transition-duration: 700ms;
        border-bottom: 1px solid rgba(255, 68, 0, 0);
        font-size: 20px;
        text-decoration: none;
    }
    .submit button:hover{
        color: orangered;
        border-bottom: 1px solid orangered;
        background-color: aqua;
    }
    .kata-kata{
        margin-top: 100px;
        margin-left: 640px;
        font-size: 30px;
        color: rgb(19, 220, 180);
        background-color: gray;
        width: 700px;
    }
    @media only screen and (max-width: 768px) {
        nav {
            flex-wrap: wrap;
        }
        nav ul {
            flex-direction: column;
            width: 100%;
        }
        nav ul.sembunyikan {
            display: none;
        }
        .icon-list {
            display: flex;
            align-items: center;
        }
    }
</style>
<body>
    <nav>
        <div>
            <img src="../img/LogoProfile.png" alt="LogoProfile">
        </div>
        <div class="icon-list" id="icon-list">
            <i class="ph ph-list"></i>
        </div>
        <ul class="menu-list" id="sembunyikan">
            <li><a href="index.html">Home</a></li>
            <li><a href="">Kontak</a></li>
            <li><a href="">Games</a></li>
            <li><a href="">Proyek</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>
    <form>
        <div class="form-login">
            <p>Hai, silahkan login yah ^_^ </p>
            <div class="username">
                <label>Username: </label>
                <input type="text" placeholder="Masukkan username" id="username">
            </div>
            <div class="password">
                <label>Password: </label>
                <input type="password" placeholder="Masukkan password" id="password">
            </div>

            <p>Belum punya akun? silahkan <a href="" id="daftar">daftar</a></p>
            <div class="submit">
                <button  type="submit" id="enter">Enter</button>
            </div>
        </div>
    </form>
    <div class="kata-kata">
        <p>Jangan ragu untuk mencoba karena yang belum dicoba belum tentu mustahil.</p>
    </div>
</body>
<script>
    const IconList = document.getElementById("icon-list");
    const MenuList = document.getElementById("sembunyikan");

    IconList.addEventListener("click", () => {
        MenuList.classList.toggle("sembunyikan");
    });
    // const tombol = document.getElementById("enter");
    // const inputUser = document.getElementById("username");
    // const inputPassword = document.getElementById("password");
    // function cetakLog(event){
    //     event.preventDefault();
    //     let User = inputUser.value;
    //     let Pass = inputPassword.value;
    //     console.log("Username", User);
    //     console.log("Password", Pass);
    // };
    // tombol.addEventListener("click", cetakLog);

    const respon = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: User, password: Pass })
    });

    const hasil = await respon.json();

    // 3. Cek jawaban dari server
    if (hasil.sukses) {
        window.location.href = '/dashboard'; // Masuk ke dashboard
    } else {
        alert(hasil.pesan); // Muncul peringatan kalau salah
    }
</script>
</html>
